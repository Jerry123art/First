<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
        }

        canvas {
            background: #000;
            display: block;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: 0 auto 20px;
            cursor: none;
        }

        .info {
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .score {
            color: #00ff00;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .controls {
            color: white;
            font-size: 16px;
            margin-top: 20px;
            line-height: 1.8;
        }

        .controls p {
            margin: 5px 0;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        button:hover {
            background: #00cc00;
            transform: scale(1.05);
        }

        .status {
            color: #ffff00;
            font-size: 20px;
            font-weight: bold;
            height: 30px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏓 PING PONG</h1>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="score">
            Player: <span id="playerScore">0</span> | AI: <span id="aiScore">0</span>
        </div>
        <div class="status" id="status"></div>
        <button onclick="resetGame()">New Game</button>
        <div class="controls">
            <p>Move mouse UP/DOWN to control paddle</p>
            <p>First to 5 points wins!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleHeight = 100;
        const paddleWidth = 10;
        const ballSize = 8;

        let player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            score: 0
        };

        let ai = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            score: 0,
            speed: 4
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            size: ballSize
        };

        let gameActive = true;
        let gameWinner = null;

        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            
            // Smooth paddle movement
            if (mouseY - paddleHeight / 2 < canvas.height - paddleHeight) {
                if (mouseY - paddleHeight / 2 > 0) {
                    player.y = mouseY - paddleHeight / 2;
                }
            }
        });

        function resetGame() {
            player.score = 0;
            ai.score = 0;
            gameActive = true;
            gameWinner = null;
            resetBall();
            updateScore();
            updateStatus('');
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 8;
        }

        function updateScore() {
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('aiScore').textContent = ai.score;
        }

        function updateStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        function update() {
            if (!gameActive) return;

            // Ball movement
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = ball.y - ball.size < 0 ? ball.size : canvas.height - ball.size;
            }

            // Ball collision with paddles
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.dx *= 1.05; // Increase speed slightly
                ball.x = player.x + player.width + ball.size;
                ball.dy += player.dy * 0.2;
            }

            if (
                ball.x + ball.size > ai.x &&
                ball.y > ai.y &&
                ball.y < ai.y + ai.height
            ) {
                ball.dx = -ball.dx;
                ball.dx *= 1.05;
                ball.x = ai.x - ball.size;
                ball.dy += ai.dy * 0.2;
            }

            // Ball out of bounds
            if (ball.x < 0) {
                ai.score++;
                updateScore();
                checkWin();
                resetBall();
            } else if (ball.x > canvas.width) {
                player.score++;
                updateScore();
                checkWin();
                resetBall();
            }

            // AI movement
            const aiCenter = ai.y + ai.height / 2;
            if (aiCenter < ball.y - 35) {
                ai.y += ai.speed;
            } else if (aiCenter > ball.y + 35) {
                ai.y -= ai.speed;
            }

            // Keep AI paddle in bounds
            if (ai.y < 0) ai.y = 0;
            if (ai.y + ai.height > canvas.height) ai.y = canvas.height - ai.height;
        }

        function checkWin() {
            if (player.score >= 5) {
                gameActive = false;
                gameWinner = 'YOU WIN! 🎉';
                updateStatus(gameWinner);
            } else if (ai.score >= 5) {
                gameActive = false;
                gameWinner = 'AI WINS! 🤖';
                updateStatus(gameWinner);
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw paddles
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(ai.x, ai.y, ai.width, ai.height);

            // Draw ball
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        updateScore();
        gameLoop();
    </script>
</body>
</html>
